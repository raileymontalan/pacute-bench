# Evaluation configuration for benchmark evaluation
# Modeled after SEA-HELM prompt conventions:
#   https://github.com/aisingapore/SEA-HELM

# Per-benchmark instructions for the generative evaluation setting.
#
# These are applied automatically to every generative (-gen) benchmark run.
# For instruction-tuned (IT) models they are injected as the system prompt via
# the tokenizer's chat template.  For base (PT) models they are prepended as
# plain text before the question.
#
# The CLI flag --system-prompt, if provided, overrides ALL entries below.
#
# Each entry has two sub-keys:
#   instruction : the full instruction text shown to (or prepended for) the model
#   answer_tag  : the prefix the model is asked to put before its answer
#                 (e.g. "Answer:").  The evaluator strips this prefix before
#                 comparing the generated text to the ground truth.

generative_instructions:

  # ---------------------------------------------------------------------------
  # CUTE — character-level manipulation (e.g., swap two letters in a word)
  # ---------------------------------------------------------------------------
  cute-gen:
    answer_tag: "<answer>"
    instruction: |-
      You will be given a character-level word manipulation task.
      A set of worked examples demonstrates the transformation pattern.
      Apply the exact same transformation to the final word given.

      Your output MUST strictly follow this XML format:
      <reflection>Your 1-2 sentence reflection explaining the transformation pattern you identified and how you applied it.</reflection>
      <answer>ANSWER</answer>
      Replace ANSWER with the transformed result.

  # ---------------------------------------------------------------------------
  # PACUTE — Filipino morphology benchmarks (composition, manipulation,
  #           syllabification, morphological extraction/production), generative setting
  # ---------------------------------------------------------------------------
  pacute-composition-gen:
    answer_tag: "<answer>"
    instruction: |-
      You will be given a question about the composition of a Filipino word. Tasks include:
      - Spelling out a word letter by letter with spaces between each character
      - Identifying a specific character at a given position in a word
      - Counting the number of diacritical marks (tilde, accent marks) in a word
      - Counting the number of uppercase letters in a word
      - Counting the total number of characters in a word

      For spelling tasks, your answer is the word's letters separated by spaces.
      For character-finding tasks, your answer is the single character at the specified position.
      For counting tasks, your answer is a single integer.

      Your output MUST strictly follow this XML format:
      <reflection>Your 1-2 sentence reflection explaining how you analyzed the word's composition to arrive at your answer.</reflection>
      <answer>ANSWER</answer>
      Replace ANSWER with the spelled-out letters, the single character, or the integer count.

  pacute-manipulation-gen:
    answer_tag: "<answer>"
    instruction: |-
      You will be given a Filipino word and a character-level transformation to apply. Tasks include:
      - Deleting every occurrence of a specified character
      - Inserting a character after every occurrence of another specified character
      - Substituting every occurrence of one character with another
      - Swapping every occurrence of two specified characters with each other
      - Duplicating every occurrence of a specified character (inserting a copy immediately after it)
      - Converting the entire word to uppercase or lowercase
      - Removing all diacritical marks (tilde, accent marks) to produce the normalized form

      Apply the transformation exactly as described. Your answer is the single resulting word.

      Your output MUST strictly follow this XML format:
      <reflection>Your 1-2 sentence reflection identifying which characters are affected and what the word looks like after applying the transformation.</reflection>
      <answer>ANSWER</answer>
      Replace ANSWER with the transformed word.

  pacute-syllabification-gen:
    answer_tag: "<answer>"
    instruction: |-
      You will be given a question about Filipino word stress. Tasks include:
      - Identifying which syllable of a target word carries the primary stress, given a sentence
        context that disambiguates the meaning (stress_identification)
      - Writing the correct diacritically-marked form of a word given a sentence context that
        determines which stress pattern applies (stress_disambiguation)

      For both tasks your answer is a single word (the stressed syllable or the diacritically-marked form).

      Your output MUST strictly follow this XML format:
      <reflection>Your 1-2 sentence reflection explaining which stress pattern the sentence context implies and how you arrived at your answer.</reflection>
      <answer>ANSWER</answer>
      Replace ANSWER with the single correct word or syllable.

  pacute-morphological-extraction-gen:
    answer_tag: "<answer>"
    instruction: |-
      You will be given a Filipino word and asked to identify one of its morphological components. Tasks include:
      - Identifying the affix (prefix, suffix, infix, or circumfix) in an inflected word
      - Identifying the root word of an inflected form (the base before affixation)
      - Identifying the root word of a reduplicated form (the base before reduplication)
      - Identifying the reduplicant (the repeated syllable or segment) in a reduplicated word;
        if the word has no reduplication, the correct answer is "none"

      Your answer must be a single morpheme: the affix string, the root word, or the reduplicant.
      Do not include hyphens or extra punctuation. Write "none" if asked for a reduplicant that does not exist.

      Your output MUST strictly follow this XML format:
      <reflection>Your 1-2 sentence reflection explaining the morphological structure of the word and how you identified the target component.</reflection>
      <answer>ANSWER</answer>
      Replace ANSWER with the affix, root word, or reduplicant (or "none").

  pacute-morphological-production-gen:
    answer_tag: "<answer>"
    instruction: |-
      You will be given a Filipino root word and an affix (prefix, suffix, infix, or circumfix).
      Produce the correctly inflected form by attaching the affix to the root.

      When attaching affixes, apply the appropriate morphophonemic changes:
      - Nasal assimilation: a nasal-final prefix (mag-, mang-, pang-, etc.) assimilates to the
        root-initial consonant (e.g., mang- + pili → mamili; mang- + sulat → manulat)
      - Consonant deletion: the root-initial consonant may be dropped after nasal assimilation
      - Vowel changes or other phonological adjustments required by the specific affix

      Your answer is a single correctly spelled Filipino word.

      Your output MUST strictly follow this XML format:
      <reflection>Your 1-2 sentence reflection explaining how the affix attaches to the root and which morphophonemic changes (if any) you applied.</reflection>
      <answer>ANSWER</answer>
      Replace ANSWER with the correctly inflected Filipino word.

  pacute-affixation-gen:
    answer_tag: "<answer>"
    instruction: |-
      You will be given a Filipino root word and an affix (prefix, suffix, infix, or circumfix).
      Produce the correctly inflected form by attaching the affix to the root.

      When attaching affixes, apply the appropriate morphophonemic changes:
      - Nasal assimilation: a nasal-final prefix (mag-, mang-, pang-, etc.) assimilates to the
        root-initial consonant (e.g., mang- + pili → mamili; mang- + sulat → manulat)
      - Consonant deletion: the root-initial consonant may be dropped after nasal assimilation
      - Vowel changes or other phonological adjustments required by the specific affix

      Your answer is a single correctly spelled Filipino word.

      Your output MUST strictly follow this XML format:
      <reflection>Your 1-2 sentence reflection explaining how the affix attaches to the root and which morphophonemic changes (if any) you applied.</reflection>
      <answer>ANSWER</answer>
      Replace ANSWER with the correctly inflected Filipino word.

  # ---------------------------------------------------------------------------
  # Hierarchical — Filipino morphological attachment tasks (in Filipino)
  # ---------------------------------------------------------------------------
  hierarchical-gen:
    answer_tag: "<answer>"
    instruction: |-
      You will be given a question about Filipino word morphology.
      Based on the question, identify the single correct word or form that satisfies the described condition.

      Your output MUST strictly follow this XML format:
      <reflection>Your 1-2 sentence reflection explaining how you identified the correct morphological form.</reflection>
      <answer>ANSWER</answer>
      Replace ANSWER with the correct word or form.

  # ---------------------------------------------------------------------------
  # LangGame — word-property language games (shortest, longest, alphabetical, etc.)
  # ---------------------------------------------------------------------------
  langgame-gen:
    answer_tag: "<answer>"
    instruction: |-
      You will be given a language game question about the properties of a set of words,
      such as their length, alphabetical order, number of vowels, or similar characteristics.
      Based on the question, identify the single correct word.

      Your output MUST strictly follow this XML format:
      <reflection>Your 1-2 sentence reflection explaining which word property you evaluated and why your chosen word is correct.</reflection>
      <answer>ANSWER</answer>
      Replace ANSWER with the single correct word.

  # ---------------------------------------------------------------------------
  # Multi-digit addition — simple arithmetic
  # ---------------------------------------------------------------------------
  multi-digit-addition-gen:
    answer_tag: "<answer>"
    instruction: |-
      You will be given a simple arithmetic addition problem.
      Compute the sum and provide only the numerical result.

      Your output MUST strictly follow this XML format:
      <reflection>Your 1-2 sentence reflection showing your calculation and confirming the result.</reflection>
      <answer>ANSWER</answer>
      Replace ANSWER with the integer result of the calculation.
