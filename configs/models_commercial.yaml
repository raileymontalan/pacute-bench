# Commercial model configurations for evaluation via provider APIs.
# OpenAI and Anthropic use batch APIs (50% cost reduction, results within 24h).
# Google and xAI use real-time async generation (OpenAI-compatible endpoints).
# MCQ benchmarks are NOT supported — only generative (-gen) benchmarks are run.
#
# Required environment variables (per provider):
#   OPENAI_API_KEY     — for provider: openai
#   ANTHROPIC_API_KEY  — for provider: anthropic
#   GEMINI_API_KEY     — for provider: google
#   XAI_API_KEY        — for provider: xai
#
# API key proxy (optional):
#   If running on a proxy environment with proxy_tools installed, set
#   OPENAI_BASE_URL / ANTHROPIC_BASE_URL / GEMINI_BASE_URL / XAI_BASE_URL
#   to the proxy endpoint. API keys are automatically wrapped via proxy_tools.

models:
  # ============================================================================
  # OpenAI (batch API)
  # ============================================================================
  gpt-4o:
    path: gpt-4o
    type: it
    provider: openai

  gpt-4.1:
    path: gpt-4.1
    type: it
    provider: openai

  gpt-4.1-mini:
    path: gpt-4.1-mini
    type: it
    provider: openai

  gpt-4.1-nano:
    path: gpt-4.1-nano
    type: it
    provider: openai

  o3:
    path: o3
    type: it
    provider: openai

  o3-pro:
    path: o3-pro
    type: it
    provider: openai

  o4-mini:
    path: o4-mini
    type: it
    provider: openai

  # ============================================================================
  # OpenAI — async (gpt-5 family; batch API is too slow for these models)
  # ============================================================================
  gpt-5-mini:
    path: gpt-5-mini
    type: it
    provider: openai-async

  gpt-5-nano:
    path: gpt-5-nano
    type: it
    provider: openai-async

  gpt-5.1:
    path: gpt-5.1
    type: it
    provider: openai-async

  gpt-5.2:
    path: gpt-5.2
    type: it
    provider: openai-async

  gpt-5.4:
    path: gpt-5.4
    type: it
    provider: openai-async


  # ============================================================================
  # Anthropic (batch API)
  # ============================================================================

  claude-opus-4-6:
    path: claude-opus-4-6
    type: it
    provider: anthropic

  claude-sonnet-4-6:
    path: claude-sonnet-4-6
    type: it
    provider: anthropic

  claude-haiku-4-5:
    path: claude-haiku-4-5
    type: it
    provider: anthropic


  # ============================================================================
  # Google Gemini (async via OpenAI-compatible endpoint)
  # ============================================================================

  gemini-2.5-pro:
    path: gemini-2.5-pro
    type: it
    provider: google

  gemini-2.5-flash:
    path: gemini-2.5-flash
    type: it
    provider: google

  gemini-2.0-flash:
    path: gemini-2.0-flash
    type: it
    provider: google


  # ============================================================================
  # xAI Grok (async via OpenAI-compatible endpoint)
  # ============================================================================

  grok-3:
    path: grok-3
    type: it
    provider: xai

  grok-3-mini:
    path: grok-3-mini
    type: it
    provider: xai
