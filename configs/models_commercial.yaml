# Commercial model configurations for evaluation via provider APIs.
# OpenAI and Anthropic use batch APIs (50% cost reduction, results within 24h).
# Google and xAI use real-time async generation (OpenAI-compatible endpoints).
# MCQ benchmarks are NOT supported — only generative (-gen) benchmarks are run.
#
# Required environment variables (per provider):
#   OPENAI_API_KEY     — for provider: openai
#   ANTHROPIC_API_KEY  — for provider: anthropic
#   GEMINI_API_KEY     — for provider: google
#   XAI_API_KEY        — for provider: xai
#
# API key proxy (optional):
#   If running through an organization-internal proxy, set the *_BASE_URL
#   variables to the proxy endpoint. To additionally wrap API keys via a
#   local helper module, set PACUTE_BENCH_KEY_PROXY_MODULE to its dotted name
#   (see .env.example).

models:
  # ============================================================================
  # OpenAI — async (gpt-5 family; batch API is too slow for these models)
  # ============================================================================

  gpt-5.4-mini:
    path: gpt-5.4-mini
    type: it
    provider: openai-async

  gpt-5.4-nano:
    path: gpt-5.4-nano
    type: it
    provider: openai-async

  gpt-5.5:
    path: gpt-5.5
    type: it
    provider: openai-async

  # Re-added for paper continuity (§Results cites its specific Affix-GEN EM score).
  gpt-5-mini:
    path: gpt-5-mini
    type: it
    provider: openai-async

  # ============================================================================
  # Anthropic (batch API)
  # ============================================================================

  claude-opus-4-7:
    path: claude-opus-4-7
    type: it
    provider: anthropic

  claude-sonnet-4-6:
    path: claude-sonnet-4-6
    type: it
    provider: anthropic

  claude-haiku-4-5:
    path: claude-haiku-4-5
    type: it
    provider: anthropic

  # ============================================================================
  # Google Gemini (async via OpenAI-compatible endpoint)
  # ============================================================================

  gemini-3.1-flash-lite:
    path: google/gemini-3.1-flash-lite
    type: it
    provider: openai-async

  gemini-3.5-flash:
    path: google/gemini-3.5-flash
    type: it
    provider: openai-async
    thinking: true  # Gemini 3.5 Flash emits internal reasoning tokens; needs ~8K max_tokens
