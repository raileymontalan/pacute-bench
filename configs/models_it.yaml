# Instruction-tuned model configurations for evaluation.
#
# Schema fields (all optional except path and type):
#   path:                   HuggingFace model id or local path
#   type:                   "it" (instruction-tuned/chat)
#   tp:                     tensor-parallel size (default: 1)
#   thinking:               true  = thinking ON  (per-request or server-side)
#                           false = thinking OFF (Gemma4: per-request budget=0;
#                                                 Qwen3.x: combined with chat_template_kwargs)
#   reasoning_parser:       vLLM server-side reasoning parser name, e.g. "qwen3", "gemma4"
#   enable_expert_parallel: true for MoE models to distribute experts across GPUs
#   max_model_len:          context window override (default: 8192)
#   reasoning_parser_plugin: path to a custom reasoning-parser plugin script
#   language_model_only:    true to pass --language-model-only at serve time; skips loading the
#                           vision encoder for multimodal models (Gemma4) when text eval only
#   attention_backend:      vLLM attention backend override. Unset = cluster default (FLASH_ATTN).
#                           Set to "auto" to let vLLM choose (required for models with partial
#                           multimodal token attention, e.g. Gemma4 26B-A4B and 31B).
#   disable_prefix_caching:  true to pass --no-enable-prefix-caching (default: prefix caching ON)
#   disable_custom_all_reduce: true to pass --disable-custom-all-reduce; needed for hybrid
#                           Mamba+attention models where the custom all-reduce CUDA kernel
#                           fails during CUDA graph capture
#   tokenizer_mode:         vLLM tokenizer mode (e.g. "mistral" for Mistral native format)
#   config_format:          model config format (e.g. "mistral"); needed for Mistral consolidated
#                           safetensors where HF format doesn't expose expert count
#   load_format:            checkpoint load format (e.g. "mistral")
#   data_parallel_size:     integer; enables DP serving (--data-parallel-size N, TP forced to 1).
#                           tp field still determines total GPU allocation (= data_parallel_size).
#   kv_cache_dtype:         KV cache dtype (e.g. "fp8"); passed as --kv-cache-dtype
#   block_size:             KV cache block size in tokens; passed as --block-size
#   compilation_config:     JSON string passed as --compilation-config (e.g. MiniMax qk-norm fusion)
#   max_cudagraph_capture_size: integer; passed as --max-cudagraph-capture-size
#   max_num_batched_tokens: integer; passed as --max-num-batched-tokens
#   chat_template_kwargs:   JSON string passed to --default-chat-template-kwargs at serve time;
#                           used by Qwen3.x non-thinking variants to disable thinking server-side

models:
  # ============================================================================
  # AISG SEA-LION v4.5
  # ============================================================================
  sea-lion-qwen-v4.5-27b-it:
    path: aisingapore/Qwen-SEA-LION-v4.5-27B-IT
    type: it
    tp: 1
    chat_template_kwargs: '{"enable_thinking": false}'
    language_model_only: true

  sea-lion-qwen-v4.5-27b-it-thinking:
    path: aisingapore/Qwen-SEA-LION-v4.5-27B-IT
    type: it
    tp: 1
    thinking: true
    reasoning_parser: qwen3
    language_model_only: true

  sea-lion-gemma-v4.5-e2b-it:
    path: aisingapore/Gemma-SEA-LION-v4.5-E2B-IT
    type: it
    tp: 1
    language_model_only: true

  sea-lion-gemma-v4.5-e2b-it-thinking:
    path: aisingapore/Gemma-SEA-LION-v4.5-E2B-IT
    type: it
    tp: 1
    thinking: true
    reasoning_parser: gemma4
    language_model_only: true

  # ============================================================================
  # Google Gemma 3
  # ============================================================================
  gemma-3-4b-it:
    path: google/gemma-3-4B-it
    type: it
    tp: 1
    language_model_only: true

  gemma-3-12b-it:
    path: google/gemma-3-12B-it
    type: it
    tp: 1
    language_model_only: true

  gemma-3-27b-it:
    path: google/gemma-3-27B-it
    type: it
    tp: 1
    language_model_only: true

  # ============================================================================
  # Google Gemma 4
  # Thinking is controlled per-request via extra_body (not at serve time).
  # reasoning_parser: gemma4 is needed for both thinking/non-thinking variants
  # so vLLM can structure the reasoning_content output.
  # ============================================================================
  gemma-4-e2b-it:
    path: google/gemma-4-E2B-it
    type: it
    tp: 1
    language_model_only: true

  gemma-4-e2b-it-thinking:
    path: google/gemma-4-E2B-it
    type: it
    tp: 1
    thinking: true
    reasoning_parser: gemma4
    language_model_only: true

  gemma-4-e4b-it:
    path: google/gemma-4-E4B-it
    type: it
    tp: 1
    language_model_only: true

  gemma-4-e4b-it-thinking:
    path: google/gemma-4-E4B-it
    type: it
    tp: 1
    thinking: true
    reasoning_parser: gemma4
    language_model_only: true

  gemma-4-26b-a4b-it:
    path: google/gemma-4-26B-A4B-it
    type: it
    tp: 1
    language_model_only: true
    attention_backend: auto

  gemma-4-26b-a4b-it-thinking:
    path: google/gemma-4-26B-A4B-it
    type: it
    tp: 1
    thinking: true
    reasoning_parser: gemma4
    language_model_only: true
    attention_backend: auto

  gemma-4-31b-it:
    path: google/gemma-4-31B-it
    type: it
    tp: 1
    language_model_only: true
    attention_backend: auto

  gemma-4-31b-it-thinking:
    path: google/gemma-4-31B-it
    type: it
    tp: 1
    thinking: true
    reasoning_parser: gemma4
    language_model_only: true
    attention_backend: auto

  # ============================================================================
  # Qwen 3 Family
  # ============================================================================
  qwen3-4b-it:
    path: Qwen/Qwen3-4B
    type: it
    tp: 1
    chat_template_kwargs: '{"enable_thinking": false}'
    language_model_only: true

  qwen3-4b-it-thinking:
    path: Qwen/Qwen3-4B
    type: it
    tp: 1
    thinking: true
    reasoning_parser: qwen3
    language_model_only: true

  qwen3-8b-it:
    path: Qwen/Qwen3-8B
    type: it
    tp: 1
    chat_template_kwargs: '{"enable_thinking": false}'
    language_model_only: true

  qwen3-8b-it-thinking:
    path: Qwen/Qwen3-8B
    type: it
    tp: 1
    thinking: true
    reasoning_parser: qwen3
    language_model_only: true

  qwen3-14b-it:
    path: Qwen/Qwen3-14B
    type: it
    tp: 1
    chat_template_kwargs: '{"enable_thinking": false}'
    language_model_only: true

  qwen3-14b-it-thinking:
    path: Qwen/Qwen3-14B
    type: it
    tp: 1
    thinking: true
    reasoning_parser: qwen3
    language_model_only: true

  qwen3-32b-it:
    path: Qwen/Qwen3-32B
    type: it
    tp: 2
    chat_template_kwargs: '{"enable_thinking": false}'
    language_model_only: true

  qwen3-32b-it-thinking:
    path: Qwen/Qwen3-32B
    type: it
    tp: 2
    thinking: true
    reasoning_parser: qwen3
    language_model_only: true

  # ============================================================================
  # Qwen 3.6 Family
  # ============================================================================
  qwen3.6-27b-it:
    path: Qwen/Qwen3.6-27B
    type: it
    tp: 1
    chat_template_kwargs: '{"enable_thinking": false}'
    language_model_only: true

  qwen3.6-27b-it-thinking:
    path: Qwen/Qwen3.6-27B
    type: it
    tp: 1
    thinking: true
    reasoning_parser: qwen3
    language_model_only: true

  # ============================================================================
  # Mistral
  # Both Medium-3.5 and Small-4 support optional thinking mode.
  # ============================================================================
  mistral-medium-3.5-128b-it:
    path: mistralai/Mistral-Medium-3.5-128B
    type: it
    tp: 8
    tokenizer_mode: mistral
    config_format: mistral
    load_format: mistral
    language_model_only: true

  mistral-medium-3.5-128b-it-thinking:
    path: mistralai/Mistral-Medium-3.5-128B
    type: it
    tp: 8
    thinking: true
    reasoning_parser: mistral
    tokenizer_mode: mistral
    config_format: mistral
    load_format: mistral
    language_model_only: true

  mistral-small-4-119b-it:
    path: mistralai/Mistral-Small-4-119B-2603
    type: it
    tp: 2
    attention_backend: FLASH_ATTN_MLA
    max_num_batched_tokens: 16384

  mistral-small-4-119b-it-thinking:
    path: mistralai/Mistral-Small-4-119B-2603
    type: it
    tp: 2
    thinking: true
    reasoning_parser: mistral
    attention_backend: FLASH_ATTN_MLA
    max_num_batched_tokens: 16384

  # ============================================================================
  # OpenAI OSS (open-weight MoE models)
  # vLLM recipes: no reasoning-parser; prefix caching disabled; cudagraph/batch tuned.
  # ============================================================================
  gpt-oss-20b:
    path: openai/gpt-oss-20b
    type: it
    tp: 1
    thinking: true
    disable_prefix_caching: true
    max_cudagraph_capture_size: 2048
    max_num_batched_tokens: 8192

  gpt-oss-120b:
    path: openai/gpt-oss-120b
    type: it
    tp: 8
    thinking: true
    enforce_eager: true
    disable_prefix_caching: true
    max_cudagraph_capture_size: 2048
    max_num_batched_tokens: 8192

  # ============================================================================
  # Phi-4 Family
  # No base (PT) versions are publicly available; all entries are IT only.
  # phi-4-reasoning variants use chain-of-thought (<think> blocks).
  # ============================================================================
  phi-4:
    path: microsoft/phi-4
    type: it
    tp: 1
    language_model_only: true
    max_model_len: 8192

  phi-4-reasoning:
    path: microsoft/Phi-4-reasoning
    type: it
    thinking: true
    reasoning_parser: deepseek_r1
    tp: 1
    language_model_only: true

  phi-4-reasoning-plus:
    path: microsoft/Phi-4-reasoning-plus
    type: it
    thinking: true
    reasoning_parser: deepseek_r1
    tp: 1
    language_model_only: true

  phi-4-mini-instruct:
    path: microsoft/Phi-4-mini-instruct
    type: it
    tp: 1
    language_model_only: true
