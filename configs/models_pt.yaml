# Pretrained (base) model configurations for evaluation.
# Base models are evaluated via log-probabilities (MCQ only) using the
# completions endpoint — no chat template, no thinking mode.
#
# Schema fields (all optional except path and type):
#   path:                   HuggingFace model id or local path
#   type:                   "pt" (pretrained/base)
#   tp:                     tensor-parallel size (default: 1)
#   enable_expert_parallel: true for MoE models
#   language_model_only:    true to pass --language-model-only; skips vision encoder for
#                           multimodal models (Gemma4) when doing text-only eval
#   attention_backend:      vLLM attention backend override; "auto" lets vLLM choose
#   enforce_eager:          true to pass --enforce-eager; disables Inductor compilation
#   tokenizer_mode:         vLLM tokenizer mode (e.g. "deepseek_v4")
#   kv_cache_dtype:         KV cache dtype (e.g. "fp8"); passed as --kv-cache-dtype
#   block_size:             KV cache block size in tokens; passed as --block-size
#   max_num_batched_tokens: integer; passed as --max-num-batched-tokens
#   disable_custom_all_reduce: true to pass --disable-custom-all-reduce; needed for hybrid
#                           Mamba+attention models where the custom all-reduce CUDA kernel
#                           fails during CUDA graph capture

models:
  # ============================================================================
  # GPT-2 Family
  # ============================================================================
  gpt2:
    path: openai-community/gpt2
    type: pt
    tp: 1
    max_model_len: 1024

  gpt2-medium:
    path: openai-community/gpt2-medium
    type: pt
    tp: 1
    max_model_len: 1024

  gpt2-large:
    path: openai-community/gpt2-large
    type: pt
    tp: 1
    max_model_len: 1024

  gpt2-xl:
    path: openai-community/gpt2-xl
    type: pt
    tp: 1
    max_model_len: 1024

  # ============================================================================
  # Google Gemma 4 Base
  # ============================================================================
  gemma-4-e2b:
    path: google/gemma-4-E2B
    type: pt
    tp: 1
    language_model_only: true

  gemma-4-e4b:
    path: google/gemma-4-E4B
    type: pt
    tp: 1
    language_model_only: true

  gemma-4-26b-a4b:
    path: google/gemma-4-26B-A4B
    type: pt
    tp: 1
    language_model_only: true
    attention_backend: auto

  gemma-4-31b:
    path: google/gemma-4-31B
    type: pt
    tp: 1
    language_model_only: true
    attention_backend: auto

  # ============================================================================
  # Qwen 3.5 Base
  # ============================================================================
  qwen3.5-0.8b:
    path: Qwen/Qwen3.5-0.8B-Base
    type: pt
    tp: 1

  qwen3.5-2b:
    path: Qwen/Qwen3.5-2B-Base
    type: pt
    tp: 1

  qwen3.5-4b:
    path: Qwen/Qwen3.5-4B-Base
    type: pt
    tp: 1

  qwen3.5-9b:
    path: Qwen/Qwen3.5-9B-Base
    type: pt
    tp: 1
