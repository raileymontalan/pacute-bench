# Pretrained (base) model configurations for evaluation.
# Base models are evaluated via log-probabilities (MCQ only) using the
# completions endpoint — no chat template, no thinking mode.
#
# Schema fields (all optional except path and type):
#   path:                   HuggingFace model id or local path
#   type:                   "pt" (pretrained/base)
#   tp:                     tensor-parallel size (default: 1)
#   enable_expert_parallel: true for MoE models
#   language_model_only:    true to pass --language-model-only; skips vision encoder for
#                           multimodal models (Gemma4) when doing text-only eval

models:
  # ============================================================================
  # GPT-2 Family
  # ============================================================================
  gpt2:
    path: openai-community/gpt2
    type: pt
    tp: 1

  gpt2-medium:
    path: openai-community/gpt2-medium
    type: pt
    tp: 1

  gpt2-large:
    path: openai-community/gpt2-large
    type: pt
    tp: 1

  gpt2-xl:
    path: openai-community/gpt2-xl
    type: pt
    tp: 1

  # ============================================================================
  # Google Gemma 4 Base
  # ============================================================================
  gemma-4-e2b:
    path: google/gemma-4-E2B
    type: pt
    tp: 1
    enable_expert_parallel: true
    language_model_only: true

  gemma-4-e4b:
    path: google/gemma-4-E4B
    type: pt
    tp: 1
    enable_expert_parallel: true
    language_model_only: true

  gemma-4-26b-a4b:
    path: google/gemma-4-26B-A4B
    type: pt
    tp: 2
    enable_expert_parallel: true
    language_model_only: true

  gemma-4-31b:
    path: google/gemma-4-31B
    type: pt
    tp: 2
    language_model_only: true

  # ============================================================================
  # Qwen 3.5 Base
  # ============================================================================
  qwen3.5-0.8b:
    path: Qwen/Qwen3.5-0.8B-Base
    type: pt
    tp: 1

  qwen3.5-2b:
    path: Qwen/Qwen3.5-2B-Base
    type: pt
    tp: 1

  qwen3.5-4b:
    path: Qwen/Qwen3.5-4B-Base
    type: pt
    tp: 1

  qwen3.5-9b:
    path: Qwen/Qwen3.5-9B-Base
    type: pt
    tp: 1

  qwen3.5-27b:
    path: Qwen/Qwen3.5-27B-Base
    type: pt
    tp: 2

  qwen3.5-35b-a3b:
    path: Qwen/Qwen3.5-35B-A3B-Base
    type: pt
    tp: 2
    enable_expert_parallel: true

  # ============================================================================
  # NVIDIA Nemotron 3 Base
  # ============================================================================
  nemotron-3-nano-30b:
    path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
    type: pt
    tp: 2
    enable_expert_parallel: true

  nemotron-3-super-120b:
    path: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-Base-BF16
    type: pt
    tp: 4
    enable_expert_parallel: true

  # ============================================================================
  # DeepSeek V4 Base
  # ============================================================================
  deepseek-v4-flash-base:
    path: deepseek-ai/DeepSeek-V4-Flash-Base
    type: pt
    tp: 2
    enable_expert_parallel: true

  deepseek-v4-pro-base:
    path: deepseek-ai/DeepSeek-V4-Pro-Base
    type: pt
    tp: 8
    enable_expert_parallel: true

  # ============================================================================
  # Arcee Trinity Base
  # ============================================================================
  arcee-trinity-nano-base:
    path: arcee-ai/Trinity-Nano-Base
    type: pt
    tp: 1

  arcee-trinity-mini-base:
    path: arcee-ai/Trinity-Mini-Base
    type: pt
    tp: 1

  arcee-trinity-large-base:
    path: arcee-ai/Trinity-Large-Base
    type: pt
    tp: 4
